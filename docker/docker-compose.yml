# ============================================================
# DOCKER COMPOSE - CƠ SỞ DỮ LIỆU PHÂN TÁN
# Đề tài: Hệ thống đăng ký học phần nhiều cơ sở
# Mô tả: 3 Site PostgreSQL + Redis + Elasticsearch + Kibana
# ============================================================

name : csdlpt

services:
  backend:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: csdlpt_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${HADONG_USER:-csdlpt_user}:${HADONG_PASSWORD:-csdlpt_pass}@postgres_hadong:5432/${HADONG_DB:-csdlpt_hadong}
      HADONG_URL: postgresql://${HADONG_USER:-csdlpt_user}:${HADONG_PASSWORD:-csdlpt_pass}@postgres_hadong:5432/${HADONG_DB:-csdlpt_hadong}
      NGOCTRUC_URL: postgresql://${NGOCTRUC_USER:-csdlpt_user}:${NGOCTRUC_PASSWORD:-csdlpt_pass}@postgres_ngoctruc:5432/${NGOCTRUC_DB:-csdlpt_ngoctruc}
      HOALAC_URL: postgresql://${HOALAC_USER:-csdlpt_user}:${HOALAC_PASSWORD:-csdlpt_pass}@postgres_hoalac:5432/${HOALAC_DB:-csdlpt_hoalac}
      SECRET_KEY: ${SECRET_KEY:-my_super_secret_key_123}
      ALGORITHM: ${ALGORITHM:-HS256}
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../app:/app
    networks:
      - csdlpt_network
    depends_on:
      postgres_hadong:
        condition: service_healthy
      postgres_ngoctruc:
        condition: service_healthy
      postgres_hoalac:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
  # ============================================================
  # SITE HADONG (Hà Nội) - PUBLISHER
  # ============================================================
  postgres_hadong:
    image: postgres:15-alpine
    container_name: csdlpt_hadong
    environment:
      POSTGRES_DB: ${HADONG_DB:-csdlpt_hadong}
      POSTGRES_USER: ${HADONG_USER:-csdlpt_user}
      POSTGRES_PASSWORD: ${HADONG_PASSWORD:-csdlpt_pass}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    command:
      - postgres
      - "-c"
      - wal_level=logical
      - "-c"
      - max_replication_slots=10
      - "-c"
      - max_wal_senders=10
      - "-c"
      - wal_keep_size=1GB
    ports:
      - "${HADONG_PORT:-5432}:5432"
    volumes:
      - postgres_hadong_data:/var/lib/postgresql/data
      - ../db/common/01_common_tables.sql:/docker-entrypoint-initdb.d/01_common_tables.sql:ro
      - ../db/site_hadong/init/01_local_tables.sql:/docker-entrypoint-initdb.d/02_local_tables.sql:ro
    networks:
      - csdlpt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HADONG_USER:-csdlpt_user} -d ${HADONG_DB:-csdlpt_hadong}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # SITE NGOCTRUC (Ngọc Trục) - SUBSCRIBER
  # ============================================================
  postgres_ngoctruc:
    image: postgres:15-alpine
    container_name: csdlpt_ngoctruc
    environment:
      POSTGRES_DB: ${NGOCTRUC_DB:-csdlpt_ngoctruc}
      POSTGRES_USER: ${NGOCTRUC_USER:-csdlpt_user}
      POSTGRES_PASSWORD: ${NGOCTRUC_PASSWORD:-csdlpt_pass}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    depends_on:
      postgres_hadong:
        condition: service_healthy
    ports:
      - "${NGOCTRUC_PORT:-5433}:5432"
    volumes:
      - postgres_ngoctruc_data:/var/lib/postgresql/data
      - ../db/common/01_common_tables.sql:/docker-entrypoint-initdb.d/01_common_tables.sql:ro
      - ../db/site_ngoctruc/init/01_local_tables.sql:/docker-entrypoint-initdb.d/02_local_tables.sql:ro
    networks:
      - csdlpt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NGOCTRUC_USER:-csdlpt_user} -d ${NGOCTRUC_DB:-csdlpt_ngoctruc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # SITE HOALAC (Hòa Lạc) - SUBSCRIBER
  # ============================================================
  postgres_hoalac:
    image: postgres:15-alpine
    container_name: csdlpt_hoalac
    environment:
      POSTGRES_DB: ${HOALAC_DB:-csdlpt_hoalac}
      POSTGRES_USER: ${HOALAC_USER:-csdlpt_user}
      POSTGRES_PASSWORD: ${HOALAC_PASSWORD:-csdlpt_pass}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    depends_on:
      postgres_hadong:
        condition: service_healthy
    ports:
      - "${HOALAC_PORT:-5434}:5432"
    volumes:
      - postgres_hoalac_data:/var/lib/postgresql/data
      - ../db/common/01_common_tables.sql:/docker-entrypoint-initdb.d/01_common_tables.sql:ro
      - ../db/site_hoalac/init/01_local_tables.sql:/docker-entrypoint-initdb.d/02_local_tables.sql:ro
    networks:
      - csdlpt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HOALAC_USER:-csdlpt_user} -d ${HOALAC_DB:-csdlpt_hoalac}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # FDW BOOTSTRAP - Cau hinh ket noi lien site va views tong hop
  # ============================================================
  fdw_setup:
    image: postgres:15-alpine
    container_name: csdlpt_fdw_setup
    command: ["sh", "/scripts/setup-fdw.sh"]
    environment:
      HADONG_DB: ${HADONG_DB:-csdlpt_hadong}
      HADONG_USER: ${HADONG_USER:-csdlpt_user}
      HADONG_PASSWORD: ${HADONG_PASSWORD:-csdlpt_pass}
      NGOCTRUC_DB: ${NGOCTRUC_DB:-csdlpt_ngoctruc}
      NGOCTRUC_USER: ${NGOCTRUC_USER:-csdlpt_user}
      NGOCTRUC_PASSWORD: ${NGOCTRUC_PASSWORD:-csdlpt_pass}
      HOALAC_DB: ${HOALAC_DB:-csdlpt_hoalac}
      HOALAC_USER: ${HOALAC_USER:-csdlpt_user}
      HOALAC_PASSWORD: ${HOALAC_PASSWORD:-csdlpt_pass}
    volumes:
      - ../docker/fdw/setup-fdw.sh:/scripts/setup-fdw.sh:ro
      - ../sql:/sql:ro
    networks:
      - csdlpt_network
    depends_on:
      postgres_hadong:
        condition: service_healthy
      postgres_ngoctruc:
        condition: service_healthy
      postgres_hoalac:
        condition: service_healthy
    restart: "no"

  # ============================================================
  # REDIS - Cache Layer
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: csdlpt_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - csdlpt_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # ELASTICSEARCH - Search Engine
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: csdlpt_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=csdlpt-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - csdlpt_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # KIBANA - Dashboard & Visualization
  # ============================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: csdlpt_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=csdlpt-kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - csdlpt_network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

# ============================================================
# NETWORKS
# ============================================================
networks:
  csdlpt_network:
    driver: bridge

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres_hadong_data:
  postgres_ngoctruc_data:
  postgres_hoalac_data:
  redis_data:
  elasticsearch_data:
